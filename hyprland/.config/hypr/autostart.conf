#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
$selectMainMonitor = hyprctl dispatch focusmonitor DP-3
$selectLeftMonitor = hyprctl dispatch focusmonitor DP-2
$selectRightMonitor = hyprctl dispatch focusmonitor HDMI-A-2
exec-once = sleep 0.5 && $selectMainMonitor && $terminal & 
exec-once = sleep 2 && $selectLeftMonitor && env QT_QPA_PLATFORM=wayland GDK_BACKEND=wayland spotify &
exec-once = sleep 3 && $selectMainMonitor &
exec-once = hyprpm reload -n &
exec-once = swaync &
exec-once = ~/.config/waybar/scripts/settings-apply.sh
exec-once = waybar 2>/dev/null &
exec-once = awww-daemon &
exec-once = quickshell &
exec-once = wl-paste --type text --watch cliphist store #Stores only text data

exec-once = wl-paste --type image --watch cliphist store #Stores only image data


#exec-once = dbus-update-activation-environment --systemd XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE WAYLAND_DISPLAY
