; Placeholder values — all overridden at runtime by the wallpaper-adaptive
; extension which injects a <style> block setting --spice-* in :root. The
; values here only need to be valid hex so spicetify's `replace_colors = 1`
; pass rewrites Spotify's hardcoded hex codes to var(--spice-*).
[base]
