subtext            = bac2de
main               = 1e1e2e
main-elevated      = 313244
highlight          = 313244
highlight-elevated = 45475a
sidebar            = 1e1e2e
player             = 1e1e2e
card               = 313244
shadow             = 11111b
selected-row       = bac2de
button             = 89b4fa
button-active      = 74c7ec
button-disabled    = 6c7086
tab-active         = 313244
notification       = a6e3a1
notification-error = f38ba8
misc               = 6c7086
